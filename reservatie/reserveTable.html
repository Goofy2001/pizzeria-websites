<!doctype html>
<html lang="nl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reserveer een tafel – Antico Pizza</title>
    <link rel="stylesheet" href="../css/Antico.css" />
    <style>
        .form-container {
            max-width: 760px;
            margin: 4rem auto;
            padding: 2.5rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 1.05rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 1rem 1.05rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1.08rem;
        }

        button {
            background: #23a455;
            color: white;
            border: none;
            padding: 1.05rem 2.2rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1.15rem;
        }

        button:hover {
            background: #1c8a45;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <header>
        <div class="nav-container">
            <a href="../anticoHomePage.html" class="logo">
                <img src="https://www.anticopizza.be/wp-content/uploads/2020/06/Antico-Sourdoug-Pizza-IG-Logo.png"
                    alt="Antico Pizza logo" />
            </a>
            <nav>
                <ul class="main-nav">
                    <li><a href="../website/anticoMenu.html">Menu</a></li>
                    <li class="dropdown">
                        <a href="#" class="dropbtn">Order / Reserve ▼</a>
                        <ul class="dropdown-content">
                            <li><a href="reserveTable.html">Reserve a table</a></li>
                            <li><a href="../bestellen/pickupOrder.html">Order a Pick-up</a></li>
                            <li><a href="../bestellen/delivery.html">Order a delivery</a></li>
                        </ul>
                    </li>
                    <li><a href="../anticoLocations.html">Locations</a></li>
                    <li><a href="../anticoContact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero-simple">
            <h1>Reserveer een tafel</h1>
            <p>
                Kies je locatie en vul het formulier in – we nemen zo snel mogelijk
                contact op.
            </p>
        </section>

        <div class="form-container">
            <form action="https://formspree.io/f/your-form-id" method="POST">
                <div class="form-group">
                    <label for="location">Locatie</label>
                    <select id="location" name="location" required>
                        <option value="">Kies locatie...</option>
                        <option value="hal5">HAL5</option>
                        <option value="muntstraat">Muntstraat 16</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="name">Naam</label>
                    <input type="text" id="name" name="name" required placeholder="Jouw naam" />
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="jouw@email.be" />
                </div>

                <div class="form-group">
                    <label for="phone">Telefoon</label>
                    <input type="tel" id="phone" name="phone" required placeholder="+32 ..." />
                </div>

                <div class="form-group">
                    <label for="date">Datum</label>
                    <input type="date" id="date" name="date" required />
                </div>

                <div class="form-group">
                    <label for="time">Tijdstip (uur)</label>
                    <input type="time" id="time" name="time" required />
                </div>

                <div class="form-group">
                    <label for="guests">Aantal personen</label>
                    <input type="number" id="guests" name="guests" min="1" max="20" required value="2" />
                </div>

                <div class="form-group">
                    <label for="notes">Opmerkingen / speciale wensen</label>
                    <textarea id="notes" name="notes" rows="4" placeholder="Allergieën, kinderstoel, etc..."></textarea>
                </div>

                <button type="submit">Reserveer aanvraag versturen</button>
            </form>
        </div>
    </main>

    <footer>© 2026 Antico Pizza – Leuven</footer>
</body>

</html>
