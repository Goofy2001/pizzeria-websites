<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delivery bestellen – Antico Pizza</title>
  <link rel="stylesheet" href="../css/Antico.css"/>
  <style>
    .form-container { max-width: 600px; margin: 4rem auto; padding: 2rem; background: white; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .form-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
    input, select, textarea { width: 100%; padding: 0.9rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
    button { background: #23A455; color: white; border: none; padding: 1rem 2rem; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1.1rem; }
    button:hover { background: #1c8a45; }
  </style>
</head>

<body>

  <header>
    <div class="nav-container">
      <a href="../anticoHomePage.html" class="logo">
        <img src="https://www.anticopizza.be/wp-content/uploads/2020/06/Antico-Sourdoug-Pizza-IG-Logo.png" alt="Antico Pizza logo"/>
      </a>
      <nav>
        <ul class="main-nav">
          <li><a href="../website/anticoMenu.html">Menu</a></li>
          <li class="dropdown">
            <a href="#" class="dropbtn">Order / Reserve ▼</a>
            <ul class="dropdown-content">
              <li><a href="../reservatie/reserveTable.html">Reserve a table</a></li>
              <li><a href="pickupOrder.html">Order a Pick-up</a></li>
              <li><a href="delivery.html">Order a delivery</a></li>
            </ul>
          </li>
          <li><a href="../anticoLocations.html">Locations</a></li>
          <li><a href="../anticoContact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero-simple">
      <h1>Delivery bestellen</h1>
      <p>Vul je adres in, kies je pizza's en we brengen het warm bij je thuis.</p>
    </section>

    <div class="form-container">
      <form id="deliveryForm">
        <div class="form-group">
          <label for="location">Leverlocatie (welke winkel?)</label>
          <select id="location" name="location" required>
            <option value="">Laden...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="name">Naam</label>
          <input type="text" id="name" name="name" required placeholder="Jouw naam"/>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="jouwmail@voorbeeld.com"/>
        </div>

        <div class="form-group">
          <label for="phone">Telefoon</label>
          <input type="tel" id="phone" name="phone" required placeholder="+32 ... (voor bevestiging)"/>
        </div>

        <div class="form-group">
          <label for="streetname">Straat</label>
          <input type="text" id="streetname" name="streetname" required placeholder="Bijv: Muntstraat"/>
        </div>

        <div class="form-group">
          <label for="housenumber">Huisnummer</label>
          <input type="text" id="housenumber" name="housenumber" required placeholder="Bijv: 16"/>
        </div>

        <div class="form-group">
          <label for="postalcode">Postcode</label>
          <input type="text" id="postalcode" name="postalcode" required placeholder="Bijv: 3000"/>
        </div>

        <div class="form-group">
          <label for="municipality">Gemeente</label>
          <input type="text" id="municipality" name="municipality" required placeholder="Bijv: Leuven"/>
        </div>

        <div class="form-group">
          <label for="order-details">Bestelling (pizza's en aantal)</label>
          <textarea id="order-details" name="orderDetails" rows="5" required placeholder="Bijv.: 2× Margherita, 1× Diavola..."></textarea>
        </div>

        <div class="form-group">
          <label for="notes">Opmerkingen / allergieën</label>
          <textarea id="notes" name="notes" rows="3" placeholder="Verdieping, deurcode, allergieën..."></textarea>
        </div>

        <button type="submit">Bestelling plaatsen</button>
        <div id="submitMessage" style="margin-top: 1rem; padding: 1rem; border-radius: 6px; display: none;"></div>
      </form>
    </div>
  </main>

  <footer>
    © 2026 Antico Pizza – Leuven
  </footer>

</body>
<script>
  // Load branches from database on page load
  async function loadBranches() {
    const locationSelect = document.getElementById('location');
    try {
      const response = await fetch('/api/branches');
      if (!response.ok) throw new Error('Failed to fetch branches');
      
      const branches = await response.json();
      
      // Clear loading message and populate dropdown
      locationSelect.innerHTML = '<option value="">Kies locatie...</option>';
      branches.forEach(branch => {
        const option = document.createElement('option');
        option.value = branch.id;
        option.textContent = branch.name;
        locationSelect.appendChild(option);
      });
    } catch (error) {
      console.error('Error loading branches:', error);
      locationSelect.innerHTML = '<option value="">Fout bij laden van vestigingen</option>';
    }
  }

  // Handle form submission
  async function handleSubmit(e) {
    e.preventDefault();
    const form = document.getElementById('deliveryForm');
    const messageDiv = document.getElementById('submitMessage');
    
    try {
      const formData = {
        location: document.getElementById('location').value,
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        streetname: document.getElementById('streetname').value,
        housenumber: document.getElementById('housenumber').value,
        postalcode: document.getElementById('postalcode').value,
        municipality: document.getElementById('municipality').value,
        orderDetails: document.getElementById('order-details').value,
        notes: document.getElementById('notes').value,
      };

      const response = await fetch('/api/orders/delivery', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData),
      });

      const result = await response.json();

      if (response.ok) {
        messageDiv.style.backgroundColor = '#d4edda';
        messageDiv.style.color = '#155724';
        messageDiv.innerHTML = `✓ Bestelling geplaatst! Order ID: ${result.order.id}`;
        messageDiv.style.display = 'block';
        form.reset();
        loadBranches();
      } else {
        throw new Error(result.message || 'Unknown error');
      }
    } catch (error) {
      console.error('Error submitting form:', error);
      messageDiv.style.backgroundColor = '#f8d7da';
      messageDiv.style.color = '#721c24';
      messageDiv.innerHTML = `✗ Fout: ${error.message}`;
      messageDiv.style.display = 'block';
    }
  }

  // Load branches when the page loads
  document.addEventListener('DOMContentLoaded', () => {
    loadBranches();
    document.getElementById('deliveryForm').addEventListener('submit', handleSubmit);
  });
</script>
</html>
